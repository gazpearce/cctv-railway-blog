baseURL = 'https://cctv-railway-blog.up.railway.app/'
locale = 'en-gb'
title = 'The Security Gazette'
theme = 'broadsheet'
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "Expert educational resource on UK CCTV security systems, regulations, and installation guides. Trusted information for homeowners, businesses, and security professionals."
  tagline = "Authoritative Guidance on UK Security Surveillance"
  showReadingTime = true
  enableSearch = false
  enableShareButtons = true
  author = "Gary Pearce"
  
  [[params.footerLinks]]
    name = "All Guides"
    url = "/posts/"
  [[params.footerLinks]]
    name = "Categories"
    url = "/categories/"
  [[params.footerLinks]]
    name = "Tags"
    url = "/tags/"

[menu]
  [[menu.main]]
    name = "All Guides"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Categories"
    url = "/categories/"
    weight = 2
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  category = "categories"
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[minify]
  disableXML = true
  minifyOutput = true
