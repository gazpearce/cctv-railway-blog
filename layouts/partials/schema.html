{{- /* JSON-LD Schema: Organization */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "The Security Gazette",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}",
  "author": {
    "@type": "Person",
    "name": "{{ .Site.Params.author | default "Gary Pearce" }}"
  }
}
</script>

{{- if .IsPage -}}
{{- /* JSON-LD Schema: Article */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ with .Params.summary }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}",
  "author": {
    "@type": "Person",
    "name": "{{ with .Params.author }}{{ . }}{{ else }}{{ .Site.Params.author | default "Gary Pearce" }}{{ end }}"
  },
  "datePublished": "{{ .PublishDate.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "The Security Gazette"
  }
}
</script>

{{- with .Params.faqs -}}
{{- /* JSON-LD Schema: FAQPage */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{- range $index, $faq := . }}
    {{- if $index }},{{ end }}
    {
      "@type": "Question",
      "name": "{{ $faq.q }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ $faq.a }}"
      }
    }
    {{- end }}
  ]
}
</script>
{{- end -}}
{{- end -}}

{{- if .IsHome -}}
{{- /* JSON-LD Schema: WebSite */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}"
}
</script>
{{- end -}}
